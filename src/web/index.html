<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attendance Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>AI Attendance Dashboard</h1>
      <p class="muted">Period-wise, randomized, multi-instance attendance control panel.</p>
    </section>

    <section class="card">
      <h2>Run Period</h2>
      <form id="run-form">
        <label>Class ID <input id="class-id" value="CSE-A-2026" required></label>
        <label>Duration (min) <input id="duration" type="number" value="5" min="3"></label>
        <label>Checks Count <input id="checks" type="number" value="2" min="1"></label>
        <label>Threshold (0-1) <input id="threshold" type="number" step="0.01" value="0.75"></label>
        <label>Min Instances <input id="min-instances" type="number" value="2" min="1"></label>
        <label>Sec per minute <input id="spm" type="number" step="0.01" value="0.01"></label>
        <button type="submit">Start Period Run</button>
      </form>
      <p id="run-status" class="muted"></p>
    </section>

    <section class="card">
      <h2>Browse Periods</h2>
      <div class="row">
        <button id="refresh-periods">Refresh Periods</button>
        <input id="period-id" type="number" placeholder="Enter period id">
        <button id="load-period">Load Period</button>
      </div>
      <table id="periods-table">
        <thead>
          <tr>
            <th>Period ID</th>
            <th>Class</th>
            <th>Status</th>
            <th>Started</th>
            <th>Ended</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Attendance</h2>
      <table id="attendance-table">
        <thead>
          <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Seen</th>
            <th>Ratio</th>
            <th>AI</th>
            <th>Final</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Override</h2>
      <form id="override-form">
        <label>Period ID <input id="ov-period-id" type="number" required></label>
        <label>Student ID <input id="ov-student-id" required></label>
        <label>New Status
          <select id="ov-status">
            <option>PRESENT</option>
            <option>ABSENT</option>
          </select>
        </label>
        <label>Lecturer <input id="ov-lecturer" value="P.Swetha"></label>
        <label>Reason <input id="ov-reason" value="Manual review"></label>
        <button type="submit">Apply Override</button>
      </form>
      <p id="ov-status-msg" class="muted"></p>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
